<script>
const catMap = {'임플란트':'implant','심미치료':'aesthetic','신경치료':'endo','치과상식':'info','일반':'info'};
const catLabel = {'임플란트':'Implant','심미치료':'Aesthetic','신경치료':'Endodontics','치과상식':'Info','일반':'Info'};





function makeDBCard(p){
  const cat = catMap[p.category]||'info';
  const tag = catLabel[p.category]||p.category;
  const date = new Date(p.created_at).toLocaleDateString('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit'}).replace(/\. /g,'.').replace(/\.$/,'');
  // Extract plain text from HTML content for excerpt
  const tmpDiv = document.createElement('div');
  tmpDiv.innerHTML = p.content;
  const plainText = tmpDiv.textContent || tmpDiv.innerText || p.content;
  const excerpt = plainText.substring(0,100)+(plainText.length>100?'...':'');
  const thumb = p.thumbnail_url || null;
  const drBadge = p.doctor_name ? `<div class="blog-card-doctor" onclick="event.stopPropagation();location.href='doctors.html?id=${p.doctor_id}'">${p.doctor_photo?'<img src="'+p.doctor_photo+'" alt="">':'<i class="fas fa-user-md"></i>'} ${p.doctor_name}</div>` : '';
  return `<a href="blog-post.html?id=${p.id}" class="blog-card" data-category="${cat}" data-tilt style="text-decoration:none;color:inherit;display:block">
    ${thumb ? '<div style="width:100%;height:200px;overflow:hidden;border-radius:12px 12px 0 0"><img src="'+thumb+'" style="width:100%;height:100%;object-fit:cover" alt="" loading="lazy"></div>' : ''}
    <div class="blog-card-body">
      <div class="blog-card-tag">${tag}</div>
      <div class="blog-card-date">${date}</div>
      <h3>${p.title}</h3>
      <p>${excerpt}</p>
      ${drBadge}
      <span class="blog-card-link">자세히 보기 →</span>
    </div>
  </a>`;
}

// Load and render
(async function(){
  const grid = document.getElementById('blog-grid');
  let dbPosts = [];
  
  try {
    const res = await fetch('/api/blog');
    if(!res.ok) throw new Error('API error: ' + res.status);
    const data = await res.json();
    dbPosts = data.posts || [];
  } catch(e){
    console.warn('Blog API load failed:', e);
  }

  // Render DB posts only
  let html = '';
  dbPosts.forEach(p => html += makeDBCard(p));
  grid.innerHTML = html;

  // Show empty state if no posts
  if(dbPosts.length === 0){
    document.getElementById('empty-msg').style.display = 'block';
  }

  // Re-init card entrance and tilt (pages.js runs early)
  document.querySelectorAll('.blog-card').forEach(c=>{
    c.style.opacity='0';
    c.style.transform='translateY(30px)';
  });
  const observer = new IntersectionObserver(entries=>{
    entries.forEach((e,i)=>{
      if(e.isIntersecting){
        setTimeout(()=>{
          e.target.style.transition='opacity .6s ease, transform .6s ease';
          e.target.style.opacity='1';
          e.target.style.transform='translateY(0)';
        },i*80);
        observer.unobserve(e.target);
      }
    });
  },{threshold:.05});
  document.querySelectorAll('.blog-card').forEach(c=>observer.observe(c));

  // Re-init filter
  initBlogFilter();
})();

function initBlogFilter(){
  const btns = document.querySelectorAll('.filter-btn');
  const cards = document.querySelectorAll('#blog-grid [data-category]');
  btns.forEach(btn=>{
    btn.addEventListener('click',()=>{
      btns.forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      const cat = btn.dataset.filter;
      cards.forEach(card=>{
        if(cat==='all'||card.dataset.category===cat){
          card.style.display='';
          card.style.opacity='0';
          card.style.transform='translateY(20px)';
          requestAnimationFrame(()=>{
            card.style.transition='opacity .5s ease, transform .5s ease';
            card.style.opacity='1';
            card.style.transform='translateY(0)';
          });
        } else {
          card.style.opacity='0';
          card.style.transform='translateY(20px)';
          setTimeout(()=>card.style.display='none',300);
        }
      });
    });
  });
}


</script>
