<style>
/* BA detail modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;display:none;align-items:center;justify-content:center;padding:2rem;opacity:0;transition:opacity .3s}
.modal-overlay.show{display:flex;opacity:1}
.modal-box{background:var(--ink-2,#141413);border:1px solid #333;border-radius:16px;max-width:800px;width:100%;max-height:85vh;overflow-y:auto;position:relative}
.modal-close{position:absolute;top:1rem;right:1rem;width:36px;height:36px;background:rgba(255,255,255,.1);border:none;border-radius:50%;color:#fff;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2;transition:background .2s}
.modal-close:hover{background:rgba(191,164,106,.3)}
.modal-header{padding:2rem 2rem 1rem}
.modal-tag{font-family:var(--ff-en,'Bebas Neue');font-size:.7rem;letter-spacing:2px;color:var(--gold,#BFA46A);text-transform:uppercase}
.modal-title{font-family:var(--ff-title,'Black Han Sans');font-size:1.4rem;margin-top:.5rem;line-height:1.35}
.modal-desc{font-size:.85rem;color:#999;margin-top:.5rem;line-height:1.6}
.modal-photos{padding:0 2rem 2rem}
.photo-section{margin-bottom:1.5rem}
.photo-section-title{font-size:.8rem;color:var(--gold,#BFA46A);font-weight:600;margin-bottom:.8rem;letter-spacing:1px;text-transform:uppercase}
.photo-compare{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;position:relative}
.photo-compare::after{content:'→';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);background:var(--gold,#BFA46A);color:#0a0a0a;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.9rem;font-weight:700;z-index:1}
.photo-item{position:relative;border-radius:10px;overflow:hidden;cursor:pointer}
.photo-item img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;transition:transform .3s}
.photo-item:hover img{transform:scale(1.03)}
.photo-label{position:absolute;bottom:8px;left:8px;background:rgba(0,0,0,.7);color:#fff;font-size:.68rem;padding:3px 10px;border-radius:4px;letter-spacing:1px;font-weight:600}
.photo-label.after{background:var(--gold,#BFA46A);color:#0a0a0a}
/* Lightbox */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:10000;display:none;align-items:center;justify-content:center;cursor:zoom-out}
.lightbox.show{display:flex}
.lightbox img{max-width:90vw;max-height:90vh;object-fit:contain;border-radius:4px}
/* BA card with images override */
.ba-card-images{display:grid;gap:2px;border-radius:12px 12px 0 0;overflow:hidden}
.ba-card-images.cols-1{grid-template-columns:1fr}
.ba-card-images.cols-2{grid-template-columns:1fr 1fr}
.ba-card-images.cols-3{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr}
.ba-card-images.cols-3 .ba-img-wrap:first-child{grid-column:1/-1}
.ba-card-images.cols-4{grid-template-columns:1fr 1fr}
.ba-img-wrap{position:relative;overflow:hidden;height:140px}
.ba-img-wrap img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.ba-card:hover .ba-img-wrap img{transform:scale(1.05)}
.ba-img-label{position:absolute;bottom:4px;left:4px;font-size:.6rem;background:rgba(0,0,0,.7);color:#fff;padding:2px 8px;border-radius:4px;font-weight:600;letter-spacing:.5px}
/* Empty state */
.empty-state{text-align:center;padding:4rem 2rem;color:#666;font-size:.9rem}
.empty-state i{font-size:3rem;margin-bottom:1rem;display:block;color:#444}
/* Doctor badge on BA card */
.ba-card-doctor{display:inline-flex;align-items:center;gap:.4rem;font-size:.75rem;color:var(--stone-l,#AFA79D);margin-top:.6rem;padding:.3rem .8rem;background:rgba(191,164,106,.08);border:1px solid rgba(191,164,106,.15);border-radius:100px;transition:all .3s;cursor:pointer}
.ba-card-doctor:hover{border-color:var(--gold,#BFA46A);color:var(--gold,#BFA46A)}
.ba-card-doctor img{width:20px;height:20px;border-radius:50%;object-fit:cover}
.modal-doctor{display:inline-flex;align-items:center;gap:.5rem;margin-top:.5rem;padding:.4rem 1rem;background:rgba(191,164,106,.08);border:1px solid rgba(191,164,106,.15);border-radius:100px;font-size:.82rem;color:var(--stone-l,#AFA79D);cursor:pointer;transition:all .3s;text-decoration:none}
.modal-doctor:hover{border-color:var(--gold,#BFA46A);color:var(--gold,#BFA46A)}
.modal-doctor img{width:24px;height:24px;border-radius:50%;object-fit:cover}
</style>
</head>

<section class="page-hero">
  <div class="page-hero-bg">RESULT</div>
  <span class="page-hero-label">Before &amp; After</span>
  <h1>치료 전후</h1>
  <p class="page-hero-sub">실제 환자분들의 치료 결과입니다</p>
</section>

<div class="filter-bar">
  <button class="filter-btn active" data-filter="all">전체</button>
  <button class="filter-btn" data-filter="implant">임플란트</button>
  <button class="filter-btn" data-filter="aesthetic">심미치료</button>
  <button class="filter-btn" data-filter="endo">신경치료</button>
</div>

<div class="card-grid" id="ba-grid">
  <!-- DB cases + static placeholder cards rendered here -->
</div>

<!-- BA detail modal -->
<div class="modal-overlay" id="ba-modal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeBAModal()">&times;</button>
    <div class="modal-header">
      <div class="modal-tag" id="ba-modal-tag"></div>
      <h2 class="modal-title" id="ba-modal-title"></h2>
      <p class="modal-desc" id="ba-modal-desc"></p>
      <a class="modal-doctor" id="ba-modal-doctor" href="#" style="display:none"></a>
    </div>
    <div class="modal-photos" id="ba-modal-photos"></div>
  </div>
</div>

<!-- Image lightbox -->
<div class="lightbox" id="lightbox" onclick="this.classList.remove('show')">
  <img id="lightbox-img" src="" alt="">
</div>

<footer>
  <div class="ft-logo">서울가온치과<span style="color:var(--gold)">.</span></div>
  <p class="ft-slogan">치과 치료가 좋은 기억이 될 수 있도록.</p>
  <p class="ft-copy">© 2026 서울가온치과의원. All rights reserved.</p>
</footer>

<link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
<script src="pages.js"></script>
<script>
const catMap = {'임플란트':'implant','심미치료':'aesthetic','신경치료':'endo','교정':'endo','기타':'info'};
const catLabel = {'임플란트':'Implant','심미치료':'Aesthetic','신경치료':'Endodontics'};

// Static placeholder cases (no real photos yet)
const staticCases = [
  {title:'70대 여성 · 상악 전체 임플란트', desc:'뼈이식 후 가이드 임플란트로 상악 전체 재건', category:'implant', tag:'Implant'},
  {title:'30대 여성 · 앞니 라미네이트 6개', desc:'앞니 6개 라미네이트로 자연스러운 스마일라인 완성', category:'aesthetic', tag:'Aesthetic'},
  {title:'60대 남성 · 하악 임플란트 3개', desc:'하악 어금니 3개 가이드 임플란트 식립', category:'implant', tag:'Implant'},
  {title:'40대 여성 · 재신경치료+크라운', desc:'이전 치과에서 실패한 신경치료를 재치료 후 크라운 완성', category:'endo', tag:'Endodontics'},
  {title:'20대 여성 · 올세라믹 크라운', desc:'앞니 올세라믹 크라운으로 자연스러운 미소 회복', category:'aesthetic', tag:'Aesthetic'},
  {title:'50대 남성 · 무절개 임플란트', desc:'무절개 가이드 수술로 최소 부담, 빠른 회복', category:'implant', tag:'Implant'},
];

let dbCases = [];

function makeStaticCard(s){
  return `<div class="ba-card" data-category="${s.category}" data-tilt>
    <div class="ba-placeholder">사진 준비 중</div>
    <div class="ba-card-body">
      <div class="ba-card-tag">${s.tag}</div>
      <h3>${s.title}</h3>
      <p>${s.desc}</p>
    </div>
  </div>`;
}

function makeDBCard(c, idx){
  const cat = catMap[c.category]||'implant';
  const tag = catLabel[c.category]||c.category;
  // Collect only uploaded images
  const imgs = [];
  if(c.intraoral_before_url) imgs.push({src:c.intraoral_before_url, label:'구내 Before'});
  if(c.intraoral_after_url) imgs.push({src:c.intraoral_after_url, label:'구내 After'});
  if(c.panorama_before_url) imgs.push({src:c.panorama_before_url, label:'파노라마 Before'});
  if(c.panorama_after_url) imgs.push({src:c.panorama_after_url, label:'파노라마 After'});

  let imgHTML = '';
  if(imgs.length > 0){
    const cols = imgs.length >= 4 ? 'cols-4' : imgs.length === 3 ? 'cols-3' : imgs.length === 2 ? 'cols-2' : 'cols-1';
    imgHTML = `<div class="ba-card-images ${cols}">${imgs.map(i=>
      `<div class="ba-img-wrap"><img src="${i.src}" alt="${i.label}"><div class="ba-img-label">${i.label}</div></div>`
    ).join('')}</div>`;
  } else {
    imgHTML = '<div class="ba-placeholder">사진 없음</div>';
  }
  
  const drBadge = c.doctor_name ? `<div class="ba-card-doctor" onclick="event.stopPropagation();location.href='doctors.html?id=${c.doctor_id}'">${c.doctor_photo?'<img src="'+c.doctor_photo+'" alt="">':'<i class="fas fa-user-md"></i>'} ${c.doctor_name}</div>` : '';
  return `<div class="ba-card" data-category="${cat}" data-tilt onclick="openBADetail(${idx})" style="cursor:pointer">
    ${imgHTML}
    <div class="ba-card-body">
      <div class="ba-card-tag">${tag}</div>
      <h3>${c.title}</h3>
      ${c.description ? '<p>'+c.description+'</p>' : ''}
      ${drBadge}
    </div>
  </div>`;
}

// Load and render
(async function(){
  const grid = document.getElementById('ba-grid');
  
  try {
    const res = await fetch('/api/before-after');
    const data = await res.json();
    dbCases = data.cases || [];
  } catch(e){}

  let html = '';
  dbCases.forEach((c, i) => html += makeDBCard(c, i));
  staticCases.forEach(s => html += makeStaticCard(s));
  grid.innerHTML = html;

  // Re-init card animations
  document.querySelectorAll('.ba-card').forEach(c=>{
    c.style.opacity='0';
    c.style.transform='translateY(30px)';
  });
  const observer = new IntersectionObserver(entries=>{
    entries.forEach((e,i)=>{
      if(e.isIntersecting){
        setTimeout(()=>{
          e.target.style.transition='opacity .6s ease, transform .6s ease';
          e.target.style.opacity='1';
          e.target.style.transform='translateY(0)';
        },i*80);
        observer.unobserve(e.target);
      }
    });
  },{threshold:.05});
  document.querySelectorAll('.ba-card').forEach(c=>observer.observe(c));

  // Re-init filter
  initBAFilter();
})();

function initBAFilter(){
  const btns = document.querySelectorAll('.filter-btn');
  const cards = document.querySelectorAll('#ba-grid [data-category]');
  btns.forEach(btn=>{
    btn.addEventListener('click',()=>{
      btns.forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      const cat = btn.dataset.filter;
      cards.forEach(card=>{
        if(cat==='all'||card.dataset.category===cat){
          card.style.display='';
          card.style.opacity='0';
          card.style.transform='translateY(20px)';
          requestAnimationFrame(()=>{
            card.style.transition='opacity .5s ease, transform .5s ease';
            card.style.opacity='1';
            card.style.transform='translateY(0)';
          });
        } else {
          card.style.opacity='0';
          card.style.transform='translateY(20px)';
          setTimeout(()=>card.style.display='none',300);
        }
      });
    });
  });
}

// BA detail modal
function openBADetail(idx){
  const c = dbCases[idx];
  if(!c) return;
  
  document.getElementById('ba-modal-tag').textContent = catLabel[c.category]||c.category;
  document.getElementById('ba-modal-title').textContent = c.title;
  document.getElementById('ba-modal-desc').textContent = c.description || '';
  
  // Doctor info
  const drArea = document.getElementById('ba-modal-doctor');
  if(drArea){
    if(c.doctor_name){
      drArea.style.display='inline-flex';
      drArea.href='doctors.html?id='+c.doctor_id;
      drArea.innerHTML=(c.doctor_photo?'<img src="'+c.doctor_photo+'" alt="">':'<i class="fas fa-user-md"></i>')+' '+c.doctor_name+' 원장';
    } else drArea.style.display='none';
  }

  let photosHTML = '';
  
  // Intraoral section (only if at least one exists)
  if(c.intraoral_before_url || c.intraoral_after_url){
    photosHTML += '<div class="photo-section"><div class="photo-section-title">구내사진</div>';
    if(c.intraoral_before_url && c.intraoral_after_url){
      photosHTML += `<div class="photo-compare">
        <div class="photo-item" onclick="openLightbox('${c.intraoral_before_url}')"><img src="${c.intraoral_before_url}" alt="구내 Before"><div class="photo-label">BEFORE</div></div>
        <div class="photo-item" onclick="openLightbox('${c.intraoral_after_url}')"><img src="${c.intraoral_after_url}" alt="구내 After"><div class="photo-label after">AFTER</div></div>
      </div>`;
    } else {
      const img = c.intraoral_before_url || c.intraoral_after_url;
      const label = c.intraoral_before_url ? 'BEFORE' : 'AFTER';
      photosHTML += `<div class="photo-item" style="max-width:400px" onclick="openLightbox('${img}')"><img src="${img}" alt="구내"><div class="photo-label">${label}</div></div>`;
    }
    photosHTML += '</div>';
  }
  
  // Panorama section (only if at least one exists)
  if(c.panorama_before_url || c.panorama_after_url){
    photosHTML += '<div class="photo-section"><div class="photo-section-title">파노라마</div>';
    if(c.panorama_before_url && c.panorama_after_url){
      photosHTML += `<div class="photo-compare">
        <div class="photo-item" onclick="openLightbox('${c.panorama_before_url}')"><img src="${c.panorama_before_url}" alt="파노라마 Before"><div class="photo-label">BEFORE</div></div>
        <div class="photo-item" onclick="openLightbox('${c.panorama_after_url}')"><img src="${c.panorama_after_url}" alt="파노라마 After"><div class="photo-label after">AFTER</div></div>
      </div>`;
    } else {
      const img = c.panorama_before_url || c.panorama_after_url;
      const label = c.panorama_before_url ? 'BEFORE' : 'AFTER';
      photosHTML += `<div class="photo-item" style="max-width:400px" onclick="openLightbox('${img}')"><img src="${img}" alt="파노라마"><div class="photo-label">${label}</div></div>`;
    }
    photosHTML += '</div>';
  }
  
  if(!photosHTML) photosHTML = '<p style="color:#666;text-align:center;padding:2rem">아직 업로드된 사진이 없습니다.</p>';
  
  document.getElementById('ba-modal-photos').innerHTML = photosHTML;
  document.getElementById('ba-modal').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeBAModal(){
  document.getElementById('ba-modal').classList.remove('show');
  document.body.style.overflow = '';
}

function openLightbox(src){
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('show');
}

// Close modal on overlay click
document.getElementById('ba-modal').addEventListener('click', function(e){
  if(e.target === this) closeBAModal();
});

document.addEventListener('keydown', function(e){
  if(e.key==='Escape'){
    closeBAModal();
    document.getElementById('lightbox').classList.remove('show');
  }
});
</script>
</body>
