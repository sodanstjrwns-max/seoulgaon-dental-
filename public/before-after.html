/* BA detail modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;display:none;align-items:center;justify-content:center;padding:2rem;opacity:0;transition:opacity .3s}
.modal-overlay.show{display:flex;opacity:1}
.modal-box{background:var(--ink-2,#141413);border:1px solid #333;border-radius:16px;max-width:800px;width:100%;max-height:85vh;overflow-y:auto;position:relative}
.modal-close{position:absolute;top:1rem;right:1rem;width:36px;height:36px;background:rgba(255,255,255,.1);border:none;border-radius:50%;color:#fff;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2;transition:background .2s}
.modal-close:hover{background:rgba(191,164,106,.3)}
.modal-header{padding:2rem 2rem 1rem}
.modal-tag{font-family:var(--ff-en,'Bebas Neue');font-size:.7rem;letter-spacing:2px;color:var(--gold,#BFA46A);text-transform:uppercase}
.modal-title{font-family:var(--ff-title);font-weight:500;font-size:1.4rem;margin-top:.5rem;line-height:1.35}
.modal-desc{font-size:.85rem;color:#999;margin-top:.5rem;line-height:1.6}
.modal-photos{padding:0 2rem 2rem}
.photo-section{margin-bottom:1.5rem}
.photo-section-title{font-size:.8rem;color:var(--gold,#BFA46A);font-weight:600;margin-bottom:.8rem;letter-spacing:1px;text-transform:uppercase}
.photo-compare{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;position:relative}
.photo-compare::after{content:'→';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);background:var(--gold,#BFA46A);color:#0a0a0a;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.9rem;font-weight:700;z-index:1}
.photo-item{position:relative;border-radius:10px;overflow:hidden;cursor:pointer}
.photo-item img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;transition:transform .3s}
.photo-item:hover img{transform:scale(1.03)}
.photo-label{position:absolute;bottom:8px;left:8px;background:rgba(0,0,0,.7);color:#fff;font-size:.68rem;padding:3px 10px;border-radius:4px;letter-spacing:1px;font-weight:600}
.photo-label.after{background:var(--gold,#BFA46A);color:#0a0a0a}
/* Lightbox */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:10000;display:none;align-items:center;justify-content:center;cursor:zoom-out}
.lightbox.show{display:flex}
.lightbox img{max-width:90vw;max-height:90vh;object-fit:contain;border-radius:4px}
/* BA card with images override */
.ba-card-images{display:grid;gap:2px;border-radius:12px 12px 0 0;overflow:hidden}
.ba-card-images.cols-1{grid-template-columns:1fr}
.ba-card-images.cols-2{grid-template-columns:1fr 1fr}
.ba-card-images.cols-3{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr}
.ba-card-images.cols-3 .ba-img-wrap:first-child{grid-column:1/-1}
.ba-card-images.cols-4{grid-template-columns:1fr 1fr}
.ba-img-wrap{position:relative;overflow:hidden;height:140px;background:linear-gradient(135deg,#1a1918 0%,#252321 100%)}
.ba-img-wrap img{width:100%;height:140px;object-fit:cover;opacity:0;transition:opacity .2s ease}
.ba-img-wrap img.img-ok{opacity:1;transition:opacity .2s ease,transform .3s}
.ba-card:hover .ba-img-wrap img.img-ok{transform:scale(1.05)}
.ba-img-label{position:absolute;bottom:4px;left:4px;font-size:.6rem;background:rgba(0,0,0,.7);color:#fff;padding:2px 8px;border-radius:4px;font-weight:600;letter-spacing:.5px}

<script>
// ===== MEMBER AUTH CHECK =====
const MEMBER_TOKEN_KEY = 'gaon_member_token';
const MEMBER_USER_KEY = 'gaon_member_user';
let isMember = false;

function checkMemberAuth(){
  const token = localStorage.getItem(MEMBER_TOKEN_KEY);
  const user = JSON.parse(localStorage.getItem(MEMBER_USER_KEY) || 'null');
  const navLink = document.getElementById('nav-login-link');
  const mobLink = document.getElementById('mob-login-link');
  if(token && user){
    isMember = true;
    document.getElementById('member-bar').style.display = 'flex';
    document.getElementById('member-name').textContent = user.name;
    if(navLink){ navLink.innerHTML = '<i class="fas fa-user-check"></i> ' + user.name + '님'; navLink.href = '#'; navLink.onclick = function(e){ e.preventDefault(); memberLogout(); }; }
    if(mobLink){ mobLink.innerHTML = '<i class="fas fa-user-check"></i> ' + user.name + '님 (로그아웃)'; mobLink.href = '#'; mobLink.onclick = function(e){ e.preventDefault(); memberLogout(); }; }
  } else {
    isMember = false;
    if(navLink){ navLink.innerHTML = '<i class="fas fa-user"></i> 로그인'; navLink.href = 'signup.html'; }
    if(mobLink){ mobLink.innerHTML = '<i class="fas fa-user"></i> 로그인'; mobLink.href = 'signup.html'; }
  }
  // Gallery is always visible — no blur for non-members
}
checkMemberAuth();

function memberLogout(){
  localStorage.removeItem(MEMBER_TOKEN_KEY);
  localStorage.removeItem(MEMBER_USER_KEY);
  isMember = false;
  document.getElementById('member-bar').style.display = 'none';
}

const catMap = {'임플란트':'implant','심미치료':'aesthetic','레진빌드업':'resin','기타':'info'};
const catLabel = {'임플란트':'Implant','심미치료':'Aesthetic','레진빌드업':'Resin Build-up'};

// Static placeholder cases removed — DB only

let dbCases = [];
let currentPage = 1;
let totalPages = 1;
let isLoadingMore = false;
let currentFilter = 'all';

function makeStaticCard(s){
  return `<div class="ba-card" data-category="${s.category}" data-tilt>
    <div class="ba-placeholder">사진 준비 중</div>
    <div class="ba-card-body">
      <div class="ba-card-tag">${s.tag}</div>
      <h3>${s.title}</h3>
      <p>${s.desc}</p>
    </div>
  </div>`;
}

function makeDBCard(c, idx){
  const cat = catMap[c.category]||'implant';
  const tag = catLabel[c.category]||c.category;
  // Collect only uploaded images
  const imgs = [];
  if(c.intraoral_before_url) imgs.push({src:c.intraoral_before_url, label:'구내 Before'});
  if(c.intraoral_after_url) imgs.push({src:c.intraoral_after_url, label:'구내 After'});
  if(c.panorama_before_url) imgs.push({src:c.panorama_before_url, label:'파노라마 Before'});
  if(c.panorama_after_url) imgs.push({src:c.panorama_after_url, label:'파노라마 After'});

  let imgHTML = '';
  if(imgs.length > 0){
    const cols = imgs.length >= 4 ? 'cols-4' : imgs.length === 3 ? 'cols-3' : imgs.length === 2 ? 'cols-2' : 'cols-1';
    // First 3 cards (idx<3): eager load for instant display
    // Rest: use data-src for lazy loading on scroll
    const isTop = idx < 4;
    imgHTML = `<div class="ba-card-images ${cols}">${imgs.map(i=>{
      if(isTop){
        return `<div class="ba-img-wrap"><img src="${i.src}" alt="${i.label}" width="400" height="140" loading="eager" decoding="async" fetchpriority="high" onload="this.classList.add('img-ok')"><div class="ba-img-label">${i.label}</div></div>`;
      } else {
        return `<div class="ba-img-wrap"><img data-src="${i.src}" alt="${i.label}" width="400" height="140" onload="this.classList.add('img-ok')"><div class="ba-img-label">${i.label}</div></div>`;
      }
    }).join('')}</div>`;
  } else {
    imgHTML = '<div class="ba-placeholder">사진 없음</div>';
  }
  
  const drBadge = c.doctor_name ? `<div class="ba-card-doctor" onclick="event.stopPropagation();location.href='doctors.html?id=${c.doctor_id}'">${c.doctor_photo?'<img src="'+c.doctor_photo+'" alt="">':'<i class="fas fa-user-md"></i>'} ${c.doctor_name}</div>` : '';
  return `<div class="ba-card" data-category="${cat}" data-tilt onclick="openBADetail(${idx})" style="cursor:pointer">
    ${imgHTML}
    <div class="ba-card-body">
      <div class="ba-card-tag">${tag}</div>
      <h3>${c.title}</h3>
      ${c.description ? '<p>'+c.description+'</p>' : ''}
      ${drBadge}
    </div>
  </div>`;
}

// Load cases from API (all pages)
async function loadAllCases(){
  const grid = document.getElementById('ba-grid');
  // Show skeleton loading cards for instant visual feedback
  let skelHtml = '';
  for(let i=0;i<6;i++){
    skelHtml += `<div class="ba-card" style="animation:skeletonPulse 1.2s ease infinite">
      <div style="background:rgba(255,255,255,.05);height:140px;border-radius:12px 12px 0 0"></div>
      <div class="ba-card-body">
        <div style="background:rgba(255,255,255,.08);height:12px;width:60px;border-radius:4px;margin-bottom:8px"></div>
        <div style="background:rgba(255,255,255,.06);height:16px;width:80%;border-radius:4px;margin-bottom:6px"></div>
        <div style="background:rgba(255,255,255,.04);height:12px;width:60%;border-radius:4px"></div>
      </div>
    </div>`;
  }
  grid.innerHTML = skelHtml;
  
  dbCases = [];
  let page = 1;
  let hasMore = true;
  
  // Fetch ALL pages to get every case
  while(hasMore){
    try {
      const res = await fetch(`/api/before-after?page=${page}&limit=100`);
      if(!res.ok) throw new Error('API error: ' + res.status);
      const data = await res.json();
      const cases = data.cases || [];
      dbCases = dbCases.concat(cases);
      totalPages = data.pagination?.pages || 1;
      if(page >= totalPages || cases.length === 0){
        hasMore = false;
      } else {
        page++;
      }
    } catch(e){
      console.warn('Before-After API load failed:', e);
      hasMore = false;
    }
  }

  renderCases();
}

function renderCases(){
  const grid = document.getElementById('ba-grid');
  let html = '';
  
  if(dbCases.length){
    dbCases.forEach((c, i) => html += makeDBCard(c, i));
  } else {
    // Show placeholder cards for blur effect even when no DB data
    const placeholders = [
      {title:'상악 전체 임플란트', category:'implant', tag:'Implant'},
      {title:'앞니 라미네이트', category:'aesthetic', tag:'Aesthetic'},
      {title:'하악 임플란트', category:'implant', tag:'Implant'},
      {title:'레진빌드업 수복', category:'resin', tag:'Resin Build-up'},
      {title:'올세라믹 크라운', category:'aesthetic', tag:'Aesthetic'},
      {title:'무절개 임플란트', category:'implant', tag:'Implant'},
    ];
    placeholders.forEach(s => html += makeStaticCard(s));
  }
  grid.innerHTML = html;
  
  // Show count
  if(dbCases.length){
    const countEl = document.createElement('div');
    countEl.style.cssText = 'text-align:center;padding:1rem;color:#666;font-size:.8rem';
    countEl.textContent = `총 ${dbCases.length}건의 치료 사례`;
    grid.parentNode.insertBefore(countEl, grid.nextSibling);
    // Remove previous count if exists
    const prevCount = grid.parentNode.querySelector('.ba-total-count');
    if(prevCount) prevCount.remove();
    countEl.className = 'ba-total-count';
  }

  // All cards visible immediately (no card-level animation)
  document.querySelectorAll('.ba-card').forEach(c=>{
    c.style.opacity='1'; c.style.transform='none';
  });

  // Lazy-load below-fold images when scrolling near them
  const lazyObs = new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting){
        const img = e.target;
        if(img.dataset.src){ img.src = img.dataset.src; img.removeAttribute('data-src'); }
        lazyObs.unobserve(img);
      }
    });
  },{rootMargin:'500px 0px'});
  document.querySelectorAll('.ba-img-wrap img[data-src]').forEach(img=>lazyObs.observe(img));

  // Apply current filter
  if(currentFilter !== 'all') applyFilter(currentFilter);
  
  // Re-init filter
  initBAFilter();
}

// Initial load
loadAllCases();

function applyFilter(cat){
  const cards = document.querySelectorAll('#ba-grid [data-category]');
  let visibleCount = 0;
  cards.forEach(card=>{
    if(cat==='all'||card.dataset.category===cat){
      card.style.display='';
      card.style.opacity='1';
      card.style.transform='none';
      visibleCount++;
      // Trigger lazy load for newly visible cards
      card.querySelectorAll('img[data-src]').forEach(img=>{
        img.src = img.dataset.src; img.removeAttribute('data-src');
      });
    } else {
      card.style.display='none';
    }
  });
  // Update count
  const countEl = document.querySelector('.ba-total-count');
  if(countEl && dbCases.length){
    const filtered = cat === 'all' ? dbCases.length : dbCases.filter(c => (catMap[c.category]||'implant') === cat).length;
    countEl.textContent = `총 ${filtered}건의 치료 사례`;
  }
}

function initBAFilter(){
  const btns = document.querySelectorAll('.filter-btn');
  btns.forEach(btn=>{
    btn.addEventListener('click',()=>{
      btns.forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      applyFilter(currentFilter);
    });
  });
}

// BA detail modal
function openBADetail(idx){
  // Gallery is public — no login required
  const c = dbCases[idx];
  if(!c) return;
  
  document.getElementById('ba-modal-tag').textContent = catLabel[c.category]||c.category;
  document.getElementById('ba-modal-title').textContent = c.title;
  document.getElementById('ba-modal-desc').textContent = c.description || '';
  
  // Doctor info
  const drArea = document.getElementById('ba-modal-doctor');
  if(drArea){
    if(c.doctor_name){
      drArea.style.display='inline-flex';
      drArea.href='doctors.html?id='+c.doctor_id;
      drArea.innerHTML=(c.doctor_photo?'<img src="'+c.doctor_photo+'" alt="">':'<i class="fas fa-user-md"></i>')+' '+c.doctor_name+' 원장';
    } else drArea.style.display='none';
  }

  let photosHTML = '';
  
  // Intraoral section (only if at least one exists)
  if(c.intraoral_before_url || c.intraoral_after_url){
    photosHTML += '<div class="photo-section"><div class="photo-section-title">구내사진</div>';
    if(c.intraoral_before_url && c.intraoral_after_url){
      photosHTML += `<div class="photo-compare">
        <div class="photo-item" onclick="openLightbox('${c.intraoral_before_url}')"><img src="${c.intraoral_before_url}" alt="구내 Before" loading="eager" decoding="async"><div class="photo-label">BEFORE</div></div>
        <div class="photo-item" onclick="openLightbox('${c.intraoral_after_url}')"><img src="${c.intraoral_after_url}" alt="구내 After" loading="eager" decoding="async"><div class="photo-label after">AFTER</div></div>
      </div>`;
    } else {
      const img = c.intraoral_before_url || c.intraoral_after_url;
      const label = c.intraoral_before_url ? 'BEFORE' : 'AFTER';
      photosHTML += `<div class="photo-item" style="max-width:400px" onclick="openLightbox('${img}')"><img src="${img}" alt="구내"><div class="photo-label">${label}</div></div>`;
    }
    photosHTML += '</div>';
  }
  
  // Panorama section (only if at least one exists)
  if(c.panorama_before_url || c.panorama_after_url){
    photosHTML += '<div class="photo-section"><div class="photo-section-title">파노라마</div>';
    if(c.panorama_before_url && c.panorama_after_url){
      photosHTML += `<div class="photo-compare">
        <div class="photo-item" onclick="openLightbox('${c.panorama_before_url}')"><img src="${c.panorama_before_url}" alt="파노라마 Before" loading="eager" decoding="async"><div class="photo-label">BEFORE</div></div>
        <div class="photo-item" onclick="openLightbox('${c.panorama_after_url}')"><img src="${c.panorama_after_url}" alt="파노라마 After" loading="eager" decoding="async"><div class="photo-label after">AFTER</div></div>
      </div>`;
    } else {
      const img = c.panorama_before_url || c.panorama_after_url;
      const label = c.panorama_before_url ? 'BEFORE' : 'AFTER';
      photosHTML += `<div class="photo-item" style="max-width:400px" onclick="openLightbox('${img}')"><img src="${img}" alt="파노라마"><div class="photo-label">${label}</div></div>`;
    }
    photosHTML += '</div>';
  }
  
  if(!photosHTML) photosHTML = '<p style="color:#666;text-align:center;padding:2rem">아직 업로드된 사진이 없습니다.</p>';
  
  document.getElementById('ba-modal-photos').innerHTML = photosHTML;
  document.getElementById('ba-modal').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeBAModal(){
  document.getElementById('ba-modal').classList.remove('show');
  document.body.style.overflow = '';
}

function openLightbox(src){
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('show');
}

// Close modal on overlay click
document.getElementById('ba-modal').addEventListener('click', function(e){
  if(e.target === this) closeBAModal();
});

document.addEventListener('keydown', function(e){
  if(e.key==='Escape'){
    closeBAModal();
    document.getElementById('lightbox').classList.remove('show');
  }
});
</script>
