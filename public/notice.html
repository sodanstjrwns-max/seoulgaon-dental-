<script>
function makeNoticeHTML(n, images){
  const badge = n.badge ? `<span class="notice-badge${n.badgeClass?' '+n.badgeClass:''}">${n.badge}</span>` : '';
  const openAttr = n.open ? ' data-open' : '';
  const content = (n.content||'').replace(/\n/g,'<br>');
  
  // Build images gallery if any
  let imagesHTML = '';
  if (images && images.length > 0) {
    imagesHTML = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;margin-top:1rem">' +
      images.map(img => `<img src="${img.image_url}" alt="${img.filename||''}" loading="lazy" style="width:100%;border-radius:8px;cursor:pointer;aspect-ratio:4/3;object-fit:cover;transition:transform .3s" onclick="openNoticeImg(this.src)" onmouseenter="this.style.transform='scale(1.03)'" onmouseleave="this.style.transform='scale(1)'">`).join('') +
      '</div>';
  }
  
  return `<div class="notice-item">
    <button class="notice-q"${openAttr}>
      <span>${badge}${n.title}${images&&images.length?' <i class="fas fa-image" style="color:var(--gold,#BFA46A);font-size:.7rem;margin-left:.3rem"></i>':''}</span>
      <span class="plus">+</span>
    </button>
    <div class="notice-a"><div class="notice-a-inner">${content}${imagesHTML}</div></div>
  </div>`;
}

function openNoticeImg(src){
  const lb=document.getElementById('lightbox');
  document.getElementById('lightbox-img').src=src;
  lb.style.display='flex';
}

// Load and render — DB notices only (관리자 페이지에서 관리)
(async function(){
  const list = document.getElementById('notice-list');
  let dbNotices = [];
  
  try {
    const res = await fetch('/api/notices');
    if(!res.ok) throw new Error('API error: ' + res.status);
    const data = await res.json();
    dbNotices = data.notices || [];
  } catch(e){
    console.warn('Notices API load failed:', e);
  }

  // 공지사항이 없을 때 안내
  if(!dbNotices.length){
    list.innerHTML = '<div style="padding:3rem;text-align:center;color:var(--stone,#888)">등록된 공지사항이 없습니다.</div>';
    return;
  }

  // Fetch images for each DB notice
  const noticesWithImages = await Promise.all(dbNotices.map(async n => {
    let images = [];
    try {
      const res = await fetch('/api/notices/' + n.id);
      const data = await res.json();
      images = data.images || [];
    } catch(e){ console.warn('Notice image load failed for ID=' + n.id, e); }
    return { notice: n, images };
  }));

  let html = '';
  // DB notices only (pinned on top, recent first)
  noticesWithImages.forEach(({ notice: n, images }) => {
    html += makeNoticeHTML({
      title: n.title,
      badge: n.is_pinned ? '공지' : '새 글',
      content: n.content,
      open: n.is_pinned ? true : false
    }, images);
  });
  list.innerHTML = html;

  // Init accordion for all notice items
  initAllAccordion();
})();

function initAllAccordion(){
  const qs = document.querySelectorAll('.notice-q');
  qs.forEach(q=>{
    q.addEventListener('click',function(){
      const wasActive = this.classList.contains('active');
      // Close all
      qs.forEach(oq=>{
        oq.classList.remove('active');
        oq.nextElementSibling.style.maxHeight='0';
      });
      // Open if wasn't open
      if(!wasActive){
        this.classList.add('active');
        const a=this.nextElementSibling;
        a.style.maxHeight=a.scrollHeight+'px';
      }
    });
  });
  // Auto-open items with data-open
  document.querySelectorAll('.notice-q[data-open]').forEach(q=>{
    q.classList.add('active');
    const a=q.nextElementSibling;
    a.style.maxHeight=a.scrollHeight+'px';
  });
}

// Esc key closes lightbox
document.addEventListener('keydown',function(e){
  if(e.key==='Escape') document.getElementById('lightbox').style.display='none';
});
</script>
